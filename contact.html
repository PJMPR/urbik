<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
    <meta name="description" content="">
    <link rel="canonical" href="">
    <meta property="og:type" content="website">
    <meta property="og:title" content="">
    <meta property="og:description" content="">
    <meta property="og:url" content="">
    <meta property="og:image" content="photos/8c630f6c-326c-4067-af7d-2bb81a57c9bd.JPG">
    <meta name="theme-color" content="#111111">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'ui-sans-serif', 'system-ui', 'sans-serif']
                    }
                }
            }
        };
    </script>
    <link rel="stylesheet" href="assets/css/styles.css">

<body class="theme-body" data-page="contact">
    <a href="#main-content" class="skip-link" data-i18n="common.skipToContent"></a>
    <div class="min-h-screen flex flex-col">
        <header class="sticky top-0 z-50 border-b border-black/5 theme-surface">
            <div class="mx-auto flex max-w-7xl items-center justify-between gap-4 px-4 py-4 sm:px-6 lg:px-8">
                <a href="index.html" class="text-lg font-black tracking-[0.18em] uppercase text-black">
                    <span data-i18n="site.brand"></span>
                </a>
                <div class="flex items-center gap-3 md:gap-4">
                    <nav id="site-nav" class="site-nav fixed inset-x-4 top-20 hidden rounded-3xl border border-black/10 bg-white p-5 shadow-2xl md:static md:block md:rounded-none md:border-0 md:bg-transparent md:p-0 md:shadow-none" data-i18n-attr="aria-label:common.primaryNavigation">
                        <div class="flex flex-col gap-4 md:flex-row md:items-center md:gap-6">
                            <a href="index.html" class="nav-link" data-nav-link="home" data-i18n="navigation.home"></a>
                            <a href="about.html" class="nav-link" data-nav-link="about" data-i18n="navigation.about"></a>
                            <a href="services.html" class="nav-link" data-nav-link="services" data-i18n="navigation.services"></a>
                            <a href="gallery.html" class="nav-link" data-nav-link="gallery" data-i18n="navigation.gallery"></a>
                            <a href="contact.html" class="nav-link" data-nav-link="contact" data-i18n="navigation.contact"></a>
                        </div>
                    </nav>
                    <div class="hidden items-center gap-2 sm:flex" role="group" data-i18n-attr="aria-label:common.languageSwitcher">
                        <button type="button" class="chip-button" data-lang="pl" data-i18n="common.languages.pl"></button>
                        <button type="button" class="chip-button" data-lang="de" data-i18n="common.languages.de"></button>
                    </div>
                    <button type="button" class="inline-flex h-11 w-11 items-center justify-center rounded-full border border-black/10 bg-white text-black md:hidden" data-menu-toggle aria-controls="site-nav" aria-expanded="false">
                        <span class="sr-only" data-i18n="common.openMenu"></span>
                        <svg viewBox="0 0 24 24" class="h-5 w-5" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                            <path d="M4 7h16M4 12h16M4 17h16" stroke-linecap="round"></path>
                        </svg>
                    </button>
                </div>
            </div>
            <div class="mx-auto flex max-w-7xl items-center justify-center gap-2 px-4 pb-4 sm:hidden sm:px-6 lg:px-8" role="group" data-i18n-attr="aria-label:common.languageSwitcher">
                <button type="button" class="chip-button" data-lang="pl" data-i18n="common.languages.pl"></button>
                <button type="button" class="chip-button" data-lang="de" data-i18n="common.languages.de"></button>
            </div>
        </header>

        <main id="main-content" class="flex-1">
            <section class="mx-auto max-w-7xl px-4 pb-8 pt-10 sm:px-6 lg:px-8 lg:pt-14">
                <div class="section-shell p-6 sm:p-8 lg:p-10">
                    <div class="max-w-3xl space-y-4">
                        <span class="section-label" data-i18n="contact.heroLabel"></span>
                        <h1 class="text-4xl font-black leading-tight text-black sm:text-5xl" data-i18n="contact.heroTitle"></h1>
                        <p class="text-base leading-8 text-gray-700 sm:text-lg" data-i18n="contact.heroIntro"></p>
                    </div>
                </div>
            </section>

            <section class="mx-auto max-w-7xl px-4 py-8 sm:px-6 lg:px-8">
                <div class="grid gap-8 lg:grid-cols-[minmax(0,0.95fr)_minmax(0,1.05fr)]">
                    <div class="section-shell p-6 sm:p-8 lg:p-10">
                        <div class="max-w-3xl space-y-4">
                            <span class="section-label" data-i18n="contact.detailsLabel"></span>
                            <h2 class="text-3xl font-black text-black sm:text-4xl" data-i18n="contact.detailsTitle"></h2>
                            <p class="text-base leading-8 text-gray-700 sm:text-lg" data-i18n="contact.detailsIntro"></p>
                        </div>
                        <div class="contact-grid mt-8">
                            <article class="card-item">
                                <p class="text-sm font-semibold uppercase tracking-[0.12em] text-red-700" data-i18n="contact.addressLabel"></p>
                                <h3 data-i18n="contact.address"></h3>
                                <p class="text-gray-700" data-i18n="contact.cityLine"></p>
                            </article>
                            <article class="card-item">
                                <p class="text-sm font-semibold uppercase tracking-[0.12em] text-red-700" data-i18n="contact.phonePrimaryLabel"></p>
                                <a class="text-xl font-bold text-black" href="tel:" data-contact-link="phonePrimary"></a>
                            </article>
                            <article class="card-item">
                                <p class="text-sm font-semibold uppercase tracking-[0.12em] text-red-700" data-i18n="contact.phoneSecondaryLabel"></p>
                                <a class="text-xl font-bold text-black" href="tel:" data-contact-link="phoneSecondary"></a>
                            </article>
                            <article class="card-item">
                                <p class="text-sm font-semibold uppercase tracking-[0.12em] text-red-700" data-i18n="contact.emailLabel"></p>
                                <a class="text-xl font-bold text-black break-all" href="mailto:" data-contact-link="email"></a>
                            </article>
                            <article class="card-item sm:col-span-2 lg:col-span-3">
                                <p class="text-sm font-semibold uppercase tracking-[0.12em] text-red-700" data-i18n="contact.hoursLabel"></p>
                                <p class="text-gray-700" data-i18n="contact.hours"></p>
                            </article>
                        </div>
                    </div>

                    <div class="section-shell p-6 sm:p-8 lg:p-10">
                        <div class="max-w-3xl space-y-4">
                            <span class="section-label" data-i18n="contact.formLabel"></span>
                            <h2 class="text-3xl font-black text-black sm:text-4xl" data-i18n="contact.formTitle"></h2>
                            <p class="text-base leading-8 text-gray-700 sm:text-lg" data-i18n="contact.formIntro"></p>
                        </div>
                        <form class="mt-8 grid gap-5" data-contact-form novalidate>
                            <div>
                                <label class="field-label" for="name" data-i18n="contact.form.nameLabel"></label>
                                <input id="name" name="name" type="text" class="field-input" data-i18n-attr="placeholder:contact.form.namePlaceholder" autocomplete="name">
                            </div>
                            <div class="grid gap-5 sm:grid-cols-2">
                                <div>
                                    <label class="field-label" for="phone" data-i18n="contact.form.phoneLabel"></label>
                                    <input id="phone" name="phone" type="tel" class="field-input" data-i18n-attr="placeholder:contact.form.phonePlaceholder" autocomplete="tel">
                                </div>
                                <div>
                                    <label class="field-label" for="email" data-i18n="contact.form.emailLabel"></label>
                                    <input id="email" name="email" type="email" class="field-input" data-i18n-attr="placeholder:contact.form.emailPlaceholder" autocomplete="email">
                                </div>
                            </div>
                            <div>
                                <label class="field-label" for="service" data-i18n="contact.form.serviceLabel"></label>
                                <select id="service" name="service" class="field-select" data-contact-service-select></select>
                            </div>
                            <div>
                                <label class="field-label" for="message" data-i18n="contact.form.messageLabel"></label>
                                <textarea id="message" name="message" class="field-textarea" data-i18n-attr="placeholder:contact.form.messagePlaceholder"></textarea>
                            </div>
                            <div class="flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between">
                                <button type="submit" class="btn-primary" data-i18n="contact.form.submit"></button>
                                <p class="text-sm text-gray-500" data-i18n="contact.form.disclaimer"></p>
                            </div>
                            <p class="form-status" data-form-status aria-live="polite"></p>
                        </form>
                    </div>
                </div>
            </section>
        </main>

        <footer class="footer-shell mt-auto">
            <div class="mx-auto grid max-w-7xl gap-8 px-4 py-10 sm:px-6 lg:grid-cols-[minmax(0,1.2fr)_repeat(2,minmax(0,0.8fr))] lg:px-8">
                <div class="space-y-4">
                    <p class="text-lg font-black uppercase tracking-[0.18em] text-white" data-i18n="site.brand"></p>
                    <p class="max-w-md text-sm leading-7 text-white/70" data-i18n="footer.tagline"></p>
                </div>
                <div class="space-y-3 text-sm leading-7">
                    <p class="font-semibold text-white" data-i18n="footer.locationLabel"></p>
                    <p data-i18n="contact.address"></p>
                    <p data-i18n="contact.cityLine"></p>
                </div>
                <div class="space-y-3 text-sm leading-7">
                    <p class="font-semibold text-white" data-i18n="footer.contactLabel"></p>
                    <a href="contact.html" data-i18n="navigation.contact"></a>
                    <a href="mailto:" data-contact-link="email"></a>
                    <a href="tel:" data-contact-link="phonePrimary"></a>
                </div>
            </div>
            <div class="border-t border-white/10">
                <div class="mx-auto flex max-w-7xl flex-col gap-2 px-4 py-4 text-sm text-white/65 sm:px-6 sm:flex-row sm:items-center sm:justify-between lg:px-8">
                    <p><span>&copy; </span><span data-current-year></span><span> </span><span data-i18n="site.brand"></span><span>. </span><span data-i18n="footer.rights"></span></p>
                    <p data-i18n="footer.credit"></p>
                </div>
            </div>
        </footer>
    </div>

    <div class="lightbox" data-lightbox hidden>
        <div class="lightbox-panel" role="dialog" aria-modal="true" aria-labelledby="lightbox-title" aria-describedby="lightbox-description">
            <div class="lightbox-toolbar">
                <div class="flex gap-2">
                    <button type="button" class="chip-button" data-lightbox-prev>
                        <span aria-hidden="true">&#8592;</span>
                        <span class="sr-only" data-i18n="common.previousImage"></span>
                    </button>
                    <button type="button" class="chip-button" data-lightbox-next>
                        <span aria-hidden="true">&#8594;</span>
                        <span class="sr-only" data-i18n="common.nextImage"></span>
                    </button>
                </div>
                <button type="button" class="chip-button" data-lightbox-close>
                    <span aria-hidden="true">&#10005;</span>
                    <span class="sr-only" data-i18n="common.closeLightbox"></span>
                </button>
            </div>
            <img src="" alt="" data-lightbox-image>
            <div class="lightbox-caption">
                <h3 id="lightbox-title" class="text-2xl font-bold"></h3>
                <p id="lightbox-description"></p>
            </div>
        </div>
    </div>
</body>
</html>
